<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#FAFAFA;color:#111827;padding:14px 16px 88px;line-height:1.3}
a{text-decoration:none;color:inherit;display:block}
.nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #E5E7EB;display:flex;padding:6px 2px calc(6px + env(safe-area-inset-bottom,0px));z-index:10}
.nav a{flex:1;text-align:center;padding:4px 1px;color:#6B7280;font-size:9px;font-weight:600;line-height:1.15}
.nav .ico{height:18px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.nav a.active{color:#2563EB}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.top h1{font-size:24px;font-weight:700;letter-spacing:-0.03em}
.cal{width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;color:#6B7280}
.period{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;padding:8px 12px;border-radius:999px;background:#F3F4F6;font-size:13px;font-weight:600;color:#6B7280}
.balance{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:16px;margin-bottom:10px}
.balance .lbl{font-size:13px;font-weight:600;color:#6B7280}
.balance .val{margin-top:4px;font-size:36px;font-weight:700;letter-spacing:-0.03em;line-height:1.1}
.balance .hint{margin-top:6px;font-size:12px;color:#6B7280}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:12px}
.stat .ico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.stat .ico.income{background:#ECFDF5;color:#16A34A}
.stat .ico.expense{background:#FEF2F2;color:#DC2626}
.stat .lbl{font-size:12px;font-weight:600;color:#6B7280}
.stat .val{margin-top:2px;font-size:16px;font-weight:700}
.stat .val.income{color:#16A34A}
.stat .val.expense{color:#DC2626}
.stat .sub{margin-top:2px;font-size:12px;color:#6B7280}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-head h2{font-size:16px;font-weight:700}
.sec-head .all{font-size:14px;font-weight:600;color:#2563EB}
.ops{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:4px 12px;margin-bottom:72px}
.op{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid #E5E7EB}
.op:first-child{border-top:none}
.op .badge{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.op .badge.income{background:#ECFDF5;color:#16A34A}
.op .badge.expense{background:#FEF2F2;color:#DC2626}
.op .mid{flex:1;min-width:0}
.op .title{font-size:15px;font-weight:600}
.op .acc{margin-top:1px;font-size:12px;color:#6B7280}
.op .right{text-align:right;flex-shrink:0}
.op .sum{display:block;font-size:15px;font-weight:700}
.op .sum.income{color:#16A34A}
.op .sum.expense{color:#DC2626}
.op .date{display:block;margin-top:1px;font-size:12px;color:#6B7280}
.fab{position:fixed;right:16px;bottom:72px;width:56px;height:56px;border-radius:50%;background:#2563EB;color:#fff;display:flex;align-items:center;justify-content:center;z-index:11}
</style>
</head>
<body>
<div class="top"><h1>Главная</h1><a class="cal" href="app:period:Месяц">📅</a></div>
<a class="period" href="app:period:Месяц">#Период# ▾</a>
<div class="balance"><div class="lbl">Общий остаток</div><div class="val">#ОбщийОстаток#</div><div class="hint">на всех счетах</div></div>
<div class="stats">
<a class="stat" href="app:report:dohod"><div class="ico income">↓</div><div class="lbl">Доходы</div><div class="val income">#СуммаДоходов#</div><div class="sub">#ПодписьДоходов#</div></a>
<a class="stat" href="app:report:rashod"><div class="ico expense">👛</div><div class="lbl">Расходы</div><div class="val expense">#СуммаРасходов#</div><div class="sub">#ПодписьРасходов#</div></a>
</div>
<div class="sec-head"><h2>Последние операции</h2><a class="all" href="app:operations">Все</a></div>
<div class="ops">#ПоследниеОперации#</div>
<a class="fab" href="app:fab">+</a>
<nav class="nav">
<a class="active" href="app:home"><span class="ico">⌂</span>Главная</a>
<a href="app:operations"><span class="ico">⇄</span>Операции</a>
<a href="app:reports"><span class="ico">◎</span>Отчёты</a>
<a href="app:catalogs"><span class="ico">▤</span>Справочники</a>
<a href="app:settings"><span class="ico">⚙</span>Настройки</a>
</nav>
</body>
</html>
